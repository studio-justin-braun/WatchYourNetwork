server:
  host: "192.168.1.100"
  port: 8765
  reconnect_interval_s: 10

node:
  id: "my-server-01"
  name: "My Server 01"
  color: null

capture:
  interfaces:
    - eth0
  bpf_filter: ""
  ignore_loopback: true
  ignore_multicast: true
  ignore_arp: true
  track_processes: false
  snap_length: 96

report:
  batch_interval_ms: 50
  heartbeat_interval_s: 5
  max_batch_size: 500
